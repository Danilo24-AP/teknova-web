

<div class="relative bg-[#577989] w-full h-180 sm:h-200 overflow-hidden flex justify-center items-center 2xl:max-w-380 2xl:mx-auto" 
    id="estetica-web">

    <div class="absolute inset-0 flex justify-center items-center">
        <img [ngSrc]="'assets/img/portafolio/fondo1.jpeg'" alt="fondo-background"
        width="650"
        height="750"
        class="absolute left-[-10] shadow-xl transform rotate-6 md:rotate-27 sm:left-[10%] md:left-[-10%] lg:left-[9.5%] z-20">
        
        <img [ngSrc]="'assets/img/portafolio/fondo2.jpeg'" alt="fondo-background2"
        width="650"
        height="750"
        class="hidden md:block absolute shadow-xl transform rotate-6 md:rotate-27 lg:left-[45%] md:left-[20%] md:top-[-5] z-10 opacity-90">
    </div>

    <div class="relative flex flex-col text-center z-50 gap-y-5">
        <div class="bg-black/40 px-10 py-6 rounded-lg text-center">
            <h2 class="titulo-sb poppins-bold  text-[30px] md:text-[40px] text-white">
                Cuando la estética encuentra la utilidad.
            </h2>
            <p class="subtitulo-sb poppins-medium text-gray-200 mt-4">
                Un diseño donde la belleza potencia el mensaje.
            </p>
        </div>
    </div>
</div>
