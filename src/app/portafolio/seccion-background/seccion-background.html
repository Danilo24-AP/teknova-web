

<div class="relative bg-[#577989] w-full h-180 sm:h-200 overflow-hidden flex justify-center items-center 2xl:max-w-380 2xl:mx-auto" 
    id="estetica-web">

    <div class="absolute inset-0 flex justify-center items-center">
        <img [src]=" assetsPath + '/img/portafolio/fondo1.webp'" alt="fondo-background"
        class="absolute w-100 md:w-150 md:h-1300 left-[-10] shadow-xl transform rotate-6 md:rotate-27 sm:left-[10%] md:left-[-10%] lg:left-[0%] xl:left-[9.5%] z-20">
        
        <img [src]=" assetsPath + '/img/portafolio/fondo2.webp'" alt="fondo-background2"
        class="hidden md:w-150 md:h-660 md:block absolute shadow-xl transform rotate-6 md:rotate-27 md:left-[34%] lg:left-[43%] xl:left-[48%] md:top-[-5] z-10 opacity-90">
    </div>

    <div class="relative flex flex-col text-center z-10 gap-y-5">
        <div class="bg-black/40 px-10 py-6 rounded-lg text-center">
            <h2 class="titulo-sb poppins-bold  text-[30px] md:text-[40px] text-white">
                Cuando la estética encuentra la utilidad.
            </h2>
            <p class="subtitulo-sb poppins-medium text-gray-200 mt-4">
                Un diseño donde la belleza potencia el mensaje.
            </p>
        </div>
    </div>
</div>
