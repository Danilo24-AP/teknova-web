
<div class="w-full lg:px-10 pb-40 pt-20">

    <h2 class="poppins-bold titulo-sc mb-3">
        Proyecto<br>TekNova Ing
    </h2>

    <section #carrusel class="splide" aria-label="Carrusel de proyectos de TekNova Ing">
        <div class="splide__track">
            <ul class="splide__list opacity-90">
                @for (proyecto of proyectos(); track proyecto.id) {
                    <!-- Slide 1 -->
                    <li class="splide__slide">
                        <div class="card-wrapper">
                            @if (proyecto.variante === "estandar") {
                               
                                <div class="relative w-[85vw] md:w-85 h-80 border overflow-hidden">
                                    <img [ngSrc]="proyecto.imagenUrl"
                                    fill
                                    alt="img-porft-{{proyecto.id}}"
                                    class="imgHover object-contain w-full" />
                                </div>

                                <div class="texto-parrafo mt-5 diseno-linea">
                                    <p class="poppins-medium">
                                        {{proyecto.texto}}    
                                    </p>
                                </div>
                                   
                            }
                            <!-- Slide 2 -->
                            @if (proyecto.variante === "alto") {
                               
                                <div class="relative w-[85vw] md:w-75 h-105 border overflow-hidden">
                                    <img [ngSrc]="proyecto.imagenUrl"
                                    fill
                                    alt="img-porft-{{proyecto.id}}"
                                    class="imgHover object-cover w-full"/>
                                </div>

                                <div class="texto-parrafo mt-5 diseno-linea">
                                    <p class="poppins-medium">
                                        {{proyecto.texto}}    
                                    </p>
                                </div>
                                
                            }
                            <!-- Slide 3 -->
                            @if (proyecto.variante === "ancho") {
                                
                                <div class="relative w-120 h-80 border overflow-hidden">
                                    <img [ngSrc]="proyecto.imagenUrl"
                                    fill
                                    alt="img-porft-{{proyecto.id}}"
                                    class="imgHover object-cover w-full" />
                                </div>

                                <div class="texto-parrafo mt-5 diseno-linea">
                                    <p class="poppins-medium">
                                        {{proyecto.texto}}
                                    </p>
                                </div>
                                
                            }
                        </div>
                    </li>
                }

            </ul>
        </div>
    </section>
        
</div>
