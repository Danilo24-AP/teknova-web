

<div class="px-4 md:px-0 mx-auto pt-10 pb-40 flex flex-col gap-y-15 md:gap-y-20 2xl:max-w-380 2xl:mx-auto">

    @for (proyecto of proyectosDestacados(); track proyecto.id; let isOdd = $odd) {
        <div class="flex flex-col justify-center items-center lg:flex-row mt-3 lg:mt-0 gap-5 md:gap-0"
        [class.lg:flex-row-reverse]="isOdd">

            <div class="flex flex-col justify-center lg:max-w-[50%] items-center gap-y-8 md:gap-y-13 px-6 lg:px-15 py-6 lg:py-0">
                
                <div class="text-center px-[4%] md:px-[15%]">
                    <h2 class="titulo-si poppins-bold text-[20px] md:text-[40px]">
                        {{proyecto.titulo}}
                    </h2>
                </div>

                <div class="text-center px-2 md:px-15">
                    <p class="subtitulo-si poppins-regular"> {{proyecto.descripcion}} </p>
                </div>

                <div class="flex flex-wrap gap-2 lg:px-[10%] justify-center items-center">
                    
                    @for (etiqueta of proyecto.etiquetas; track $index) {
                        <span class="px-4 py-3 etiquetas rounded-full poppins-light"
                        [class.negro] = "proyecto.tema === 'negro'"
                        [class.morado] = "proyecto.tema === 'morado'">
                            {{etiqueta}}
                        </span>
                    }
                </div>
            </div>

            <div class="w-full md:max-w-[85%] lg:max-w-[50%]">
                <div class="overflow-hidden shadow-xl rounded-2xl md:rounded-tl-2xl md:rounded-bl-2xl">
                    <img [src]=" assetsPath + proyecto.imagenUrl"
                    class="object-cover object-top w-full md:h-182 xl:h-auto"
                    [alt]="proyecto.titulo">
                </div>
            </div>

        </div>
    }
</div>
