

<div class="2xl:max-w-380 mx-auto">

    <div class="relative py-60 md:py-80 bg-white flex justify-center md:justify-start">
        
        <!-- SECCION DE DESPLAZAMIENTO A CONTACTO -->
        <div class="flex flex-col items-start md:ml-10 lg:ml-25 xl:ml-50 lg:w-95 h-auto px-10 md:px-0">
            <a routerLink="/contacto">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" 
                    viewBox="0 0 24 24" stroke-width="1"
                    stroke="currentColor"
                    class="size-10 enlace-contacto md:animate-bounce lg:animate-none">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </a>

            <h1 class="titulo-contacto poppins-semibold">
                Contactanos
            </h1>
            <p class="text-[20px] lg:text-[25px] poppins-light">Hazlo posible con <span class="color-morado">TekNova Ing.</span></p>

            <div class=" mt-7">
                <button routerLink="/contacto" class="block md:hidden btn-contacto-landing poppins-regular">Contacto</button>
            </div>
        </div>

        <!-- SECCION DE IMAGENES -->
        <div class="hidden md:block absolute top-[67%] md:left-[36%] lg:left-[40%]">
            <img [src]=" assetsPath + '/img/seccion-siete-img/img2-s7.webp'" 
                 alt="img2-s7.webp"
                 class="w-48 h-auto rounded-xl">
        </div>

        <div class="hidden md:block absolute top-[69%] left-[60%]">

        <div class="hidden md:block absolute md:top-[23%] lg:top-[38%] md:left-[32%] lg:left-[48%]">

        <div class="hidden md:block absolute top-[18%] md:left-[57%] lg:left-[61%]">
