<div #seccionAnimada>
    <div class="max-w-180 md:max-w-220 lg:max-w-280 items-center justify-center mx-auto">
        <div class="recuadro relative pb-10">
            <div class="frase-gris">
                <p class="poppins-medium text-[16px] color-gris">DESARROLLO DIGITAL</p>
            </div>
            <div class="mb-7 pt-10">
                <p class="titulo-digital poppins-semibold">
                    Creamos experiencias
                    <span class="color-morado">web</span><br>
                    y 
                    <span class="color-morado">móviles</span>
                    que hacen crecer tu negocio.
                </p>
            </div>

            <div class="px-8 lg:px-32"> 
                <p class="subtitulo-digital text-center poppins-light text-[18px] md:text-[20px] lg:text-[25px]">
                    <span class="color-morado">TekNova Ing. </span>Diseña y desarrolla soluciones digitales a medida, combinando diseño atractivo, tecnología moderna y funcionalidad real para convertir ideas en productos que generan resultados.
                </p>
            </div>
            <div class="relative flex mx-auto items-start justify-center">
                <div class="hidden lg:block">
                    <img [src]=" assetsPath + '/img/seccion-uno-img/img-1dg.webp' "
                    class="absolute shadow-2xl transform rotate-27 lg:left-10 lg:top-15 rounded-lg z-10 lg:w-64 lg:h-180"
                    alt="img-1DG.webp">
                </div>


                <img [src]=" assetsPath + '/img/seccion-uno-img/img-2dg.webp' "
                class="absolute shadow-xl transform lg:rotate-27 md:rotate-14 left-65 sm:left-60 md:left-74 lg:left-45 top-15 sm:top-15 lg:top-15 rounded-lg lg:w-64 lg:h-180"
                alt="img-2DG.webp">


                <img [src]=" assetsPath + '/img/seccion-uno-img/img-3dg.webp' "
                class="absolute shadow-2xl transform lg:rotate-27 md:rotate-14 left-15 sm:left-15 md:left-31 lg:left-130 top-15 sm:top-15 lg:top-25 rounded-lg z-10 lg:w-64 lg:h-180"
                alt="img-3DG.webp">

                <div class="hidden sm:block">
                    <img [src]=" assetsPath + '/img/seccion-uno-img/img-4dg.webp' "
                    class="absolute shadow-2xl transform md:rotate-14 lg:rotate-27 sm:top-55 sm:left-110 md:top-55 md:left-121 lg:left-188 lg:top-25 rounded-lg lg:w-58 lg:h-80"
                    alt="img-4DG.webp">
                </div>
            </div>
        </div>

    </div>
</div>
